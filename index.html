        :root {
            --bg: #030712;
            --card-bg: rgba(17, 24, 39, 0.7);
            --border-glow: #45f3ff;
            --text: #ffffff;
            --text-muted: #9ca3af;
            --primary: #45f3ff;
            --secondary: #ec4899;
            --success: #10b981;
            --error: #ef4444;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 20px;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow-x: hidden;
            position: relative;
        }

        #space-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            pointer-events: none;
        }

        .container {
            width: 100%;
            max-width: 540px;
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 0 30px rgba(69, 243, 255, 0.15);
            border: 1px solid rgba(69, 243, 255, 0.2);
            text-align: center;
            position: relative;
            z-index: 10;
            transition: all 0.3s ease;
        }

        .nav-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
            background: rgba(255,255,255,0.05);
            padding: 10px 15px;
            border-radius: 10px;
            font-size: 14px;
        }

        .nav-user {
            color: var(--primary);
            font-weight: bold;
        }

        .nav-actions button {
            background: none;
            border: 1px solid rgba(255,255,255,0.2);
            color: white;
            padding: 5px 10px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 12px;
            margin-left: 5px;
            transition: 0.2s;
        }

        .nav-actions button:hover {
            background: white;
            color: black;
        }

        h2 {
            margin-top: 0;
            color: var(--primary);
            font-size: 28px;
            text-transform: uppercase;
            letter-spacing: 2px;
            text-shadow: 0 0 15px rgba(69, 243, 255, 0.6);
        }

        .desc {
            font-size: 13px;
            color: var(--text-muted);
            margin-bottom: 25px;
        }

        .page { display: none; }
        .page.active { display: block; }

        .form-group {
            margin-bottom: 20px;
            text-align: left;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-size: 14px;
            font-weight: 600;
            color: var(--text-muted);
        }

        input, select {
            width: 100%;
            padding: 14px;
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            color: #fff;
            font-size: 15px;
            box-sizing: border-box;
            transition: all 0.3s;
        }

        input:focus, select:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 10px rgba(69, 243, 255, 0.3);
        }

        .network-selector {
            display: flex;
            gap: 10px;
        }

        .net-btn {
            flex: 1;
            padding: 12px;
            border: 1px solid rgba(255,255,255,0.1);
            background: rgba(15, 23, 42, 0.6);
            color: #fff;
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s;
        }
